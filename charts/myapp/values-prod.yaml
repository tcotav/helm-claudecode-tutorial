# Production environment overrides.
# Goal: high availability, TLS termination, tighter logging.

replicaCount: 5

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: true
  annotations: {}
  hosts:
    - host: myapp.prod.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: myapp-prod-tls
      hosts:
        - myapp.prod.example.com

config:
  logLevel: warn
  maxConnections: 200

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      storageClass: standard-rwo
      size: 8Gi
