# Dev environment overrides.
# Goal: low resource footprint, verbose logging, no external traffic.

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 50m
    memory: 64Mi

ingress:
  enabled: false

config:
  logLevel: debug
  maxConnections: 10

redis:
  enabled: false
